
<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ปนภา ทองหล้า | ข้อมูลนักเรียน</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Chonburi&family=Mitr:wght@400;500;600&family=Sarabun:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#FBF3E3;
    --paper-line:#E4D9BF;
    --ink:#233428;
    --ink-soft:#4B5C4F;
    --sage:#6E8F72;
    --sage-dark:#3F5943;
    --mustard:#E3A857;
    --mustard-dark:#9C6B22;
    --coral:#E2694A;
    --coral-dark:#9B3E27;
    --card:#FFFFFF;
    --violet:#8073B8;
    --violet-dark:#5B4F94;
    --sage-tint:#EAF3EC;
    --mustard-tint:#FBF0DC;
    --coral-tint:#FBE8E2;
    --violet-tint:#EEEBF8;
    --transition-theme: background .4s ease, color .4s ease, border-color .4s ease, box-shadow .4s ease;
  }
  html[data-theme="dark"]{
    --paper:#1B2420;
    --paper-line:#2B372F;
    --ink:#EDE7D6;
    --ink-soft:#B9C3B6;
    --sage:#8FB794;
    --sage-dark:#C7E0C9;
    --mustard:#E3A857;
    --mustard-dark:#F0C888;
    --coral:#E2694A;
    --coral-dark:#F3A78F;
    --card:#232E28;
    --violet:#9A8FCF;
    --violet-dark:#C6BEE8;
    --sage-tint:#26332A;
    --mustard-tint:#3A2F1C;
    --coral-tint:#3B2620;
    --violet-tint:#2E2A40;
  }
  body, .idcard, .tab, .page, .avatar, .photo-slot, .chip{
    transition: var(--transition-theme);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--paper);
    background-image:
      linear-gradient(var(--paper-line) 1px, transparent 1px);
    background-size: 100% 32px;
    color:var(--ink);
    font-family:'Sarabun', sans-serif;
    min-height:100vh;
    overflow-x:hidden;
    position:relative;
  }
  .decor{
    position:fixed;
    inset:0;
    z-index:0;
    pointer-events:none;
    overflow:hidden;
  }
  .decor span{
    position:absolute;
    opacity:.35;
    color:var(--sage);
    animation:drift 14s ease-in-out infinite;
  }
  .decor span:nth-child(1){ top:8%; left:6%; font-size:22px; animation-duration:11s; }
  .decor span:nth-child(2){ top:18%; left:88%; font-size:16px; color:var(--mustard-dark); animation-duration:16s; animation-delay:1s; }
  .decor span:nth-child(3){ top:62%; left:4%; font-size:18px; color:var(--coral); animation-duration:13s; animation-delay:2s; }
  .decor span:nth-child(4){ top:78%; left:92%; font-size:24px; animation-duration:17s; animation-delay:.5s; }
  .decor span:nth-child(5){ top:40%; left:95%; font-size:14px; color:var(--mustard-dark); animation-duration:12s; animation-delay:3s; }
  .decor span:nth-child(6){ top:5%; left:45%; font-size:16px; color:var(--coral); animation-duration:15s; animation-delay:1.5s; }
  @keyframes drift{
    0%,100%{ transform:translateY(0) rotate(0deg); }
    50%{ transform:translateY(-22px) rotate(12deg); }
  }
  @keyframes riseIn{
    from{ opacity:0; transform:translateY(18px); }
    to{ opacity:1; transform:translateY(0); }
  }
  @keyframes popIn{
    from{ opacity:0; transform:translateY(14px) scale(.92); }
    to{ opacity:1; transform:translateY(0) scale(1); }
  }
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:18px;
    animation:riseIn .5s ease both;
  }
  .greeting{
    font-family:'Mitr', sans-serif;
    font-size:14px;
    color:var(--ink-soft);
  }
  .greeting b{ color:var(--sage-dark); }
  .lamp-toggle{
    display:flex;
    align-items:center;
    gap:8px;
    cursor:pointer;
    background:var(--card);
    border:2px solid var(--ink);
    border-radius:20px;
    padding:6px 14px 6px 10px;
    font-family:'Mitr', sans-serif;
    font-size:12.5px;
    color:var(--ink);
    box-shadow:2px 2px 0 rgba(35,52,40,.18);
    user-select:none;
  }
  .lamp-toggle svg{ width:18px; height:18px; transition:transform .3s ease; }
  .lamp-toggle.on svg{ transform:rotate(-18deg); color:var(--mustard-dark); }
  .wrap{
    max-width:960px;
    margin:0 auto;
    padding:36px 20px 60px;
    position:relative;
    z-index:1;
  }

  /* Header / ID card */
  .idcard{
    position:relative;
    background:var(--card);
    border:2px solid var(--ink);
    border-radius:18px;
    padding:28px 28px 24px;
    display:flex;
    gap:24px;
    align-items:center;
    box-shadow:6px 6px 0 var(--sage);
    margin-bottom:44px;
    animation:riseIn .6s ease both;
    transition:transform .25s ease, box-shadow .25s ease;
  }
  .idcard:hover{
    transform:translateY(-4px) rotate(-.4deg);
    box-shadow:8px 10px 0 var(--sage);
  }
  .seal{
    position:absolute;
    top:-22px;
    right:22px;
    width:56px;
    height:56px;
    border-radius:50%;
    background:var(--coral);
    border:2.5px solid var(--ink);
    display:flex;
    align-items:center;
    justify-content:center;
    animation:spin 9s linear infinite;
  }
  .seal svg{ width:26px; height:26px; animation:spin 9s linear infinite reverse; }
  @keyframes spin{ from{ transform:rotate(0deg); } to{ transform:rotate(360deg); } }
  .idcard::before{
    content:"โรงเรียนพานทอง";
    position:absolute;
    top:-14px;
    left:28px;
    background:var(--mustard);
    color:#412402;
    font-family:'Mitr', sans-serif;
    font-weight:600;
    font-size:13px;
    padding:4px 14px;
    border-radius:20px;
    border:2px solid var(--ink);
  }
  .avatar{
    flex:0 0 auto;
    width:104px;
    height:104px;
    border-radius:50%;
    background:var(--sage);
    border:3px solid var(--ink);
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .avatar svg{ width:64px; height:64px; }
  .idcard-text h1{
    font-family:'Chonburi', cursive;
    font-size:26px;
    margin:0 0 6px;
    color:var(--sage-dark);
    line-height:1.3;
  }
  .idcard-text p{
    margin:2px 0;
    font-size:15px;
    color:var(--ink-soft);
  }
  .idcard-text .role{
    font-family:'Mitr', sans-serif;
    font-size:13px;
    color:var(--coral-dark);
    font-weight:500;
    letter-spacing:.02em;
  }

  /* Tabs */
  .tabs{
    display:grid;
    grid-template-columns:repeat(5, 1fr);
    gap:14px;
    margin-bottom:8px;
  }
  .tab{
    background:var(--card);
    border:2px solid var(--ink);
    border-radius:14px 14px 4px 4px;
    padding:16px 8px 12px;
    text-align:center;
    cursor:pointer;
    font-family:'Mitr', sans-serif;
    font-size:13px;
    color:var(--ink);
    transition:transform .15s cubic-bezier(.34,1.56,.64,1), box-shadow .15s ease, background .15s ease;
    box-shadow:3px 3px 0 rgba(35,52,40,.18);
    -webkit-tap-highlight-color:transparent;
    opacity:0;
    animation:popIn .5s ease both;
  }
  .tab:nth-child(1){ animation-delay:.05s; }
  .tab:nth-child(2){ animation-delay:.1s; }
  .tab:nth-child(3){ animation-delay:.15s; }
  .tab:nth-child(4){ animation-delay:.2s; }
  .tab:nth-child(5){ animation-delay:.25s; }
  .tab svg{ width:30px; height:30px; margin-bottom:8px; display:block; margin-left:auto; margin-right:auto; transition:transform .3s ease; }
  .tab:hover{ transform:translateY(-4px) scale(1.03); box-shadow:3px 7px 0 rgba(35,52,40,.22); }
  .tab:active{ transform:translateY(-1px) scale(.97); }
  .tab.active{
    background:var(--sage);
    color:#fff;
    box-shadow:3px 3px 0 var(--coral-dark);
  }
  .tab.active svg{ stroke:#fff; transform:scale(1.12) rotate(-6deg); }

  /* Page panel */
  .page{
    position:relative;
    background:var(--card);
    border:2px solid var(--ink);
    border-radius:4px 18px 18px 18px;
    margin-top:24px;
    padding:32px 32px 32px 54px;
    min-height:260px;
    box-shadow:6px 6px 0 var(--mustard);
    perspective:1400px;
    overflow:hidden;
  }
  .page-inner{
    transform-origin:left center;
    animation:flipIn .45s cubic-bezier(.2,.7,.3,1) both;
  }
  @keyframes flipIn{
    from{ opacity:0; transform:rotateY(-8deg) translateX(-10px); }
    to{ opacity:1; transform:rotateY(0) translateX(0); }
  }
  .confetti{
    position:absolute;
    width:8px;
    height:8px;
    top:-10px;
    border-radius:2px;
    animation:fall 1.5s ease-in forwards;
    pointer-events:none;
  }
  @keyframes fall{
    to{ transform:translateY(240px) rotate(360deg); opacity:0; }
  }
  .plane-confetti{
    position:absolute;
    top:-24px;
    font-size:20px;
    line-height:1;
    animation:planeFall 1.8s ease-in forwards;
    pointer-events:none;
  }
  @keyframes planeFall{
    0%{ transform:translateY(0) rotate(0deg); opacity:1; }
    100%{ transform:translateY(280px) rotate(25deg); opacity:0; }
  }
  .page::before{
    content:"";
    position:absolute;
    left:20px;
    top:24px;
    bottom:24px;
    width:2px;
    background:repeating-linear-gradient(
      to bottom, var(--paper-line) 0 10px, transparent 10px 22px
    );
  }
  .page::after{
    content:"";
    position:absolute;
    left:14px;
    top:0; bottom:0;
    width:14px;
    background-image:radial-gradient(circle, var(--paper) 5px, transparent 5.5px);
    background-size:14px 44px;
    background-position:0 22px;
  }
  .page h2{
    font-family:'Chonburi', cursive;
    color:var(--sage-dark);
    font-size:22px;
    margin:0 0 4px;
  }
  .page .sub{
    font-family:'Mitr', sans-serif;
    font-size:12.5px;
    color:var(--coral-dark);
    margin:0 0 20px;
  }
  .page-body{
    display:flex;
    gap:26px;
    align-items:flex-start;
    flex-wrap:wrap;
  }
  .photo-slot{
    flex:0 0 auto;
    width:150px;
    height:190px;
    border:2px dashed var(--sage);
    border-radius:10px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    color:var(--sage-dark);
    background:#F6F1E4;
    padding:10px;
  }
  .photo-slot svg{ width:36px; height:36px; margin-bottom:8px; animation:pulse 2.4s ease-in-out infinite; }
  @keyframes pulse{ 0%,100%{ opacity:.55; transform:scale(1); } 50%{ opacity:1; transform:scale(1.08); } }
  .photo-slot span{ font-family:'Mitr', sans-serif; font-size:11px; line-height:1.5; }
  .flip-card{
    flex:0 0 auto;
    width:150px;
    height:190px;
    perspective:1000px;
    cursor:pointer;
  }
  .flip-card-inner{
    position:relative;
    width:100%;
    height:100%;
    transition:transform .6s cubic-bezier(.4,.2,.2,1);
    transform-style:preserve-3d;
    border-radius:10px;
    box-shadow:2px 2px 0 rgba(35,52,40,.15);
  }
  .flip-card.flipped .flip-card-inner{ transform:rotateY(180deg); }
  .flip-face{
    position:absolute;
    inset:0;
    backface-visibility:hidden;
    border-radius:10px;
    border:2px solid var(--ink);
    overflow:hidden;
  }
  .flip-face img{ width:100%; height:100%; object-fit:cover; display:block; }
  .flip-face.back{ transform:rotateY(180deg); }
  .flip-hint{
    position:absolute;
    bottom:6px;
    right:6px;
    background:rgba(35,52,40,.65);
    color:#fff;
    font-family:'Mitr', sans-serif;
    font-size:10px;
    padding:3px 8px;
    border-radius:10px;
  }
  .edu-rows{
    display:flex;
    flex-direction:column;
    gap:26px;
    width:100%;
    flex:1 1 100%;
  }
  .edu-row{
    display:flex;
    gap:22px;
    align-items:center;
    flex-wrap:wrap;
    padding-bottom:22px;
    border-bottom:1px dashed var(--paper-line);
    opacity:0;
    animation:riseIn .45s ease both;
  }
  .edu-row:last-child{ border-bottom:none; padding-bottom:0; }
  .edu-info{ flex:1 1 200px; }
  .edu-label{
    font-family:'Mitr', sans-serif;
    font-size:12px;
    color:var(--coral-dark);
    margin:0 0 6px;
    letter-spacing:.02em;
  }
  .edu-school{
    font-size:17px;
    font-weight:600;
    margin:0 0 6px;
  }
  .edu-plan{
    font-size:14px;
    color:var(--ink-soft);
    margin:0;
  }
  .txt-blue{ color:#2F5DA8; }
  .txt-pink{ color:#E0609C; }
  .txt-red{ color:#D8432E; }
  .txt-black{ color:var(--ink); }
  .flip-card.small{ width:120px; height:150px; }
  .skill-grid{
    display:grid;
    grid-template-columns:repeat(2, 1fr);
    gap:18px;
    width:100%;
    flex:1 1 100%;
  }
  .skill-card{
    position:relative;
    background:var(--card);
    border:2px solid var(--ink);
    border-radius:16px;
    padding:22px 14px 18px;
    display:flex;
    flex-direction:column;
    align-items:center;
    text-align:center;
    gap:12px;
    opacity:0;
    animation:popIn .5s ease both;
    transition:transform .2s cubic-bezier(.34,1.56,.64,1), box-shadow .2s ease;
    box-shadow:3px 3px 0 rgba(35,52,40,.15);
    overflow:hidden;
  }
  .skill-card::before{
    content:"";
    position:absolute;
    top:-30px; right:-30px;
    width:70px; height:70px;
    border-radius:50%;
    background:var(--skill-color);
    opacity:.15;
  }
  .skill-card:hover{
    transform:translateY(-6px) rotate(-1.2deg);
    box-shadow:4px 9px 0 rgba(35,52,40,.2);
  }
  .skill-card:nth-child(even):hover{ transform:translateY(-6px) rotate(1.2deg); }
  .skill-icon{
    width:58px;
    height:58px;
    border-radius:50%;
    background:var(--skill-color);
    border:2px solid var(--ink);
    display:flex;
    align-items:center;
    justify-content:center;
    flex-shrink:0;
  }
  .skill-icon svg{ width:28px; height:28px; }
  .skill-num{
    position:absolute;
    top:10px; left:12px;
    font-family:'Chonburi', cursive;
    font-size:13px;
    color:var(--skill-color);
    opacity:.7;
  }
  .skill-label{
    font-family:'Mitr', sans-serif;
    font-weight:500;
    font-size:14.5px;
    color:var(--ink);
    margin:0;
    line-height:1.4;
  }
  @media (max-width:520px){
    .skill-grid{ grid-template-columns:1fr; }
  }
  .hobby-grid{
    display:grid;
    grid-template-columns:repeat(3, 1fr);
    gap:18px;
    width:100%;
    flex:1 1 100%;
  }
  .hobby-card{
    position:relative;
    background:linear-gradient(155deg, var(--accent-tint) 0%, var(--card) 68%);
    border:2px solid var(--ink);
    border-radius:14px;
    padding:10px 10px 16px;
    text-align:center;
    opacity:0;
    animation:popIn .5s ease both;
    transition:transform .2s cubic-bezier(.34,1.56,.64,1), box-shadow .2s ease;
    box-shadow:3px 3px 0 rgba(35,52,40,.15);
    overflow:hidden;
  }
  .hobby-card::before{
    content:"";
    position:absolute;
    top:-26px; left:-26px;
    width:64px; height:64px;
    border-radius:50%;
    background:var(--accent);
    opacity:.25;
  }
  .hobby-card:hover{ transform:translateY(-6px) rotate(-1deg); box-shadow:4px 8px 0 rgba(35,52,40,.2); }
  .hobby-photo{
    width:100%;
    aspect-ratio:4/5;
    border-radius:10px;
    overflow:hidden;
    border:2px solid var(--ink);
    margin-bottom:12px;
    position:relative;
    z-index:1;
  }
  .hobby-photo img{ width:100%; height:100%; object-fit:cover; display:block; }
  .hobby-badge{
    position:relative;
    z-index:1;
    display:inline-flex;
    align-items:center;
    gap:7px;
    background:var(--accent);
    color:#fff;
    border:2px solid var(--ink);
    border-radius:20px;
    padding:6px 14px 6px 6px;
    font-family:'Mitr', sans-serif;
    font-weight:600;
    font-size:12.5px;
    box-shadow:2px 2px 0 rgba(35,52,40,.18);
  }
  .hobby-badge-icon{
    width:24px;
    height:24px;
    background:rgba(255,255,255,.22);
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-shrink:0;
  }
  .hobby-badge-icon svg{ width:14px; height:14px; }
  .hobby-stat{
    position:relative;
    z-index:1;
    font-family:'Mitr', sans-serif;
    font-size:11.5px;
    color:var(--coral-dark);
    margin:8px 0 0;
  }
  @media (max-width:640px){
    .hobby-grid{ grid-template-columns:repeat(2,1fr); }
  }
  @media (max-width:420px){
    .hobby-grid{ grid-template-columns:1fr; }
  }
  .award-grid{
    display:grid;
    grid-template-columns:repeat(2, 1fr);
    gap:18px;
    width:100%;
    flex:1 1 100%;
  }
  .award-card{
    position:relative;
    background:linear-gradient(155deg, var(--accent-tint) 0%, var(--card) 68%);
    border:2px solid var(--ink);
    border-radius:14px;
    padding:12px 12px 16px;
    text-align:center;
    opacity:0;
    animation:popIn .5s ease both;
    transition:transform .2s cubic-bezier(.34,1.56,.64,1), box-shadow .2s ease;
    box-shadow:3px 3px 0 rgba(35,52,40,.15);
    overflow:hidden;
  }
  .award-card::before{
    content:"";
    position:absolute;
    top:-26px; right:-26px;
    width:64px; height:64px;
    border-radius:50%;
    background:var(--accent);
    opacity:.25;
  }
  .award-card:hover{ transform:translateY(-6px) rotate(-1deg); box-shadow:4px 8px 0 rgba(35,52,40,.2); }
  .award-photo{
    width:100%;
    aspect-ratio:4/3;
    border-radius:10px;
    overflow:hidden;
    border:2px solid var(--ink);
    margin-bottom:10px;
    position:relative;
    z-index:1;
  }
  .award-photo img{ width:100%; height:100%; object-fit:cover; display:block; }
  .award-title{
    position:relative;
    z-index:1;
    font-family:'Mitr', sans-serif;
    font-weight:600;
    font-size:14px;
    color:var(--ink);
    margin:0;
    line-height:1.4;
  }
  .award-desc{
    position:relative;
    z-index:1;
    font-family:'Sarabun', sans-serif;
    font-size:12.5px;
    color:#2F5DA8;
    margin:7px 0 0;
    line-height:1.5;
  }
  html[data-theme="dark"] .award-desc{ color:#7FA8E8; }
  @media (max-width:640px){
    .award-grid{ grid-template-columns:1fr; }
  }
  .info-list{
    flex:1 1 260px;
    list-style:none;
    margin:0;
    padding:0;
  }
  .info-list li{
    padding:9px 0;
    border-bottom:1px solid var(--paper-line);
    display:flex;
    gap:10px;
    font-size:15px;
    opacity:0;
    animation:riseIn .4s ease both;
  }
  .info-list li:last-child{ border-bottom:none; }
  .info-list b{
    font-family:'Mitr', sans-serif;
    font-weight:500;
    color:var(--ink-soft);
    min-width:120px;
    flex:0 0 auto;
  }
  .chips{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    margin-top:4px;
  }
  .chip{
    background:var(--mustard);
    color:#412402;
    font-family:'Mitr', sans-serif;
    font-size:12.5px;
    padding:6px 13px;
    border-radius:20px;
    border:1.5px solid var(--ink);
    opacity:0;
    animation:popIn .4s ease both;
  }
  .note{
    margin-top:18px;
    font-size:12.5px;
    color:var(--ink-soft);
    font-style:italic;
  }
  footer{
    text-align:center;
    margin-top:40px;
    font-family:'Mitr', sans-serif;
    font-size:12px;
    color:var(--ink-soft);
  }
  @media (max-width:640px){
    .topbar{ flex-direction:column; align-items:flex-start; gap:10px; }
    .idcard{ flex-direction:column; text-align:center; }
    .tabs{ grid-template-columns:repeat(3,1fr); }
    .tab span{ display:block; }
    .page{ padding:26px 18px 26px 40px; }
    .page::before, .page::after{ display:none; }
  }
</style>
</head>
<body>
<div class="decor" aria-hidden="true">

function burstConfetti(container){
  const colors = ['#6E8F72','#E3A857','#E2694A','#3F5943'];
  for(let i=0;i<18;i++){
    const p = document.createElement('div');
    p.className = 'confetti';
    p.style.left = (Math.random()*90+2) + '%';
    p.style.background = colors[i % colors.length];
    p.style.animationDelay = (Math.random()*.3) + 's';
    p.style.animationDuration = (1.1 + Math.random()*.6) + 's';
    container.appendChild(p);
    setTimeout(() => p.remove(), 2000);
  }
}

function burstPlanes(container){
  for(let i=0;i<12;i++){
    const p = document.createElement('div');
    p.className = 'plane-confetti';
    p.textContent = '✈️';
    p.style.left = (Math.random()*88+2) + '%';
    p.style.animationDelay = (Math.random()*.5) + 's';
    p.style.animationDuration = (1.4 + Math.random()*.8) + 's';
    p.style.fontSize = (16 + Math.random()*10) + 'px';
    container.appendChild(p);
    setTimeout(() => p.remove(), 2600);
  }
}

function render(key){
  const d = data[key];
  const page = document.getElementById('page');
  let bodyHtml = '';

  if(d.levels){
    bodyHtml = `<div class="edu-rows">` + d.levels.map((lv,i) => `
      <div class="edu-row" style="animation-delay:${.1*i}s">
        <div class="flip-card small" data-flip>
          <div class="flip-card-inner">
            <div class="flip-face front"><img src="${lv.imgFlip[0]}" alt="${lv.label}"></div>
            <div class="flip-face back"><img src="${lv.imgFlip[1]}" alt="${lv.label}"></div>
          </div>
          <span class="flip-hint">แตะเพื่อพลิกรูป</span>
        </div>
        <div class="edu-info">
          <p class="edu-label">${lv.label}</p>
          <p class="edu-school"><span class="txt-${lv.prefixColor}">${lv.schoolPrefix}</span> <span class="txt-${lv.schoolColor}">${lv.schoolName}</span></p>
          ${lv.plan ? `<p class="edu-plan">แผนการเรียน: ${lv.plan}</p>` : ''}
        </div>
      </div>
    `).join('') + `</div>`;
  } else if(d.skills){
    bodyHtml = `<div class="skill-grid">` + d.skills.map((s,i) => `
      <div class="skill-card" style="--skill-color:var(--${s.color}); animation-delay:${.1*i}s">
        <span class="skill-num">0${i+1}</span>
        <div class="skill-icon">${skillIcons[s.icon]}</div>
        <p class="skill-label">${s.label}</p>
      </div>
    `).join('') + `</div>`;
  } else if(d.hobbies){
    bodyHtml = `<div class="hobby-grid">` + d.hobbies.map((h,i) => `
      <div class="hobby-card" style="--accent:var(--${h.color}); --accent-tint:var(--${h.color}-tint); animation-delay:${.1*i}s">
        <div class="hobby-photo"><img src="${h.img}" alt="${h.label}"></div>
        <div class="hobby-badge">
          <span class="hobby-badge-icon">${hobbyIcons[h.icon]}</span>
          <span>${h.label}</span>
        </div>
        ${h.stat ? `<p class="hobby-stat">✦ ${h.stat}</p>` : ''}
      </div>
    `).join('') + `</div>`;
  } else if(d.achievements){
    bodyHtml = `<div class="award-grid">` + d.achievements.map((a,i) => `
      <div class="award-card" style="--accent:var(--${a.color}); --accent-tint:var(--${a.color}-tint); animation-delay:${.1*i}s">
        <div class="award-photo"><img src="${a.img}" alt="${a.label}"></div>
        <p class="award-title">${a.label}</p>
        ${a.desc ? `<p class="award-desc">${a.desc}</p>` : ''}
      </div>
    `).join('') + `</div>`;
  } else if(d.items){
    bodyHtml = `<ul class="info-list">` + d.items.map(([k,v],i) => `<li style="animation-delay:${.08*i}s"><b>${k}</b><span>${v}</span></li>`).join('') + `</ul>`;
  } else if(d.chips){
    bodyHtml = `<div><div class="chips">` + d.chips.map((c,i) => `<span class="chip" style="animation-delay:${.08*i}s">${c}</span>`).join('') + `</div>
    <p class="note">${d.note}</p></div>`;
  }

  let photoHtml = '';
  if(d.imgFlip){
    photoHtml = `
      <div class="flip-card" data-flip>
        <div class="flip-card-inner">
          <div class="flip-face front"><img src="${d.imgFlip[0]}" alt="${d.title}"></div>
          <div class="flip-face back"><img src="${d.imgFlip[1]}" alt="${d.title}"></div>
        </div>
        <span class="flip-hint">แตะเพื่อพลิกรูป</span>
      </div>
    `;
  } else if(d.img){
    photoHtml = `<div class="photo-slot"><img src="${d.img}" alt="${d.title}" style="width:100%;height:100%;object-fit:cover;border-radius:8px;"></div>`;
  } else if(!d.levels && !d.skills && !d.hobbies && !d.achievements){
    photoHtml = `<div class="photo-slot">${iconSvg()}<span>${d.photoText}</span></div>`;
  }

  page.innerHTML = `
    <div class="page-inner">
      <h2>${d.title}</h2>
      <p class="sub">${d.sub}</p>
      <div class="page-body">
        ${photoHtml}
        ${bodyHtml}
      </div>
    </div>
  `;
  if(key === 'award'){
    burstConfetti(page);
  }
  if(key === 'hobby'){
    burstPlanes(page);
  }
  page.querySelectorAll('[data-flip]').forEach(card => {
    card.addEventListener('click', () => card.classList.toggle('flipped'));
  });
}

document.querySelectorAll('.tab').forEach(tab => {

    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    render(tab.dataset.tab);
  });
});

const hour = new Date().getHours();
let greetWord = 'สวัสดีตอนเช้า';
if(hour >= 11 && hour < 15) greetWord = 'สวัสดีตอนเที่ยง';
else if(hour >= 15 && hour < 18) greetWord = 'สวัสดีตอนบ่าย';
else if(hour >= 18 || hour < 5) greetWord = 'สวัสดีตอนเย็น';
document.getElementById('greeting').innerHTML = `${greetWord} ยินดีต้อนรับสู่ <b>ข้อมูลนักเรียน</b> ของปนภา`;

const lampToggle = document.getElementById('lampToggle');
const lampLabel = document.getElementById('lampLabel');
lampToggle.addEventListener('click', () => {
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  if(isDark){
    document.documentElement.removeAttribute('data-theme');
    lampLabel.textContent = 'โหมดกลางวัน';
    lampToggle.classList.remove('on');
  } else {
    document.documentElement.setAttribute('data-theme', 'dark');
    lampLabel.textContent = 'โหมดกลางคืน';
    lampToggle.classList.add('on');
  }
});

document.addEventListener('mousemove', (e) => {
  const x = (e.clientX / window.innerWidth - .5) * 16;
  const y = (e.clientY / window.innerHeight - .5) * 16;
  document.querySelectorAll('.decor span').forEach((s, i) => {
    const depth = (i % 3 + 1) / 3;
    s.style.marginLeft = `${x * depth}px`;
    s.style.marginTop = `${y * depth}px`;
  });
});
</script>

</html>
